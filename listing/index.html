<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="theme-color" content="#111">
        <title>Listing Dashboard - Simple Patches</title>
        <link rel="stylesheet" type="text/css" href="/listing/panel.css">

        <!-- Externals -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </head>
    <body>
        <header>
            <h1>Listing Dashboard</h1>
            <nav id="enhancement_nav"></nav>
        </header>
        <main id="content">
            <div id="pageLoader">
                <i class="fa-solid fa-spinner fa-spin"></i>
            </div>
        </main>
        <div id="itemModalOverlay"></div>
        <div id="itemModal">
            <button id="closeItemModal"><i class="fa-solid fa-xmark"></i></button>
            <div class="modalHeader">
                <img id="modalImage">
                <div class="info">
                    <h2 id="modalTitle"></h2>
                    <div class="meta">
                        <p><strong>SKU</strong><span id="modalSKU"></span></p>
                        <p><strong>SID</strong><span id="modalSID"></span></p>
                        <p><strong>Condition</strong><span id="modalCondition"></span></p>
                    </div>
                </div>
                <div class="modalStats">
                    <div class="stat"><h5>In Stock</h5><p id="modalQty"></p></div>
                    <div class="stat"><h5>Price</h5><p id="modalPrice"></p></div>
                    <div class="stat"><h5>Value</h5><p id="modalValue"></p></div>
                </div>
                <div id="modalDescription"></div>
                <div class="modalActions">
                    <a id="modalSKUButton" class="button" target="_blank">View SKU</a>
                    <a id="modalSIDButton" class="button" target="_blank">View SID</a>
                </div>
            </div>
        </div>
        <script type="text/javascript" src="/listing/panel.js"></script>
    </body>
</html>
