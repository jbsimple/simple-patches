<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="theme-color" content="#111">
        <title>Listing Dashboard - Simple Patches</title>
        <link rel="stylesheet" type="text/css" href="/listing/panel.css">

        <!-- Externals -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </head>
    <body>
        <header>
            <h1>Listing Dashboard</h1>
            <nav id="enhancement_nav"></nav>
        </header>
        <main id="content">
            <div id="pageLoader">
                <i class="fa-solid fa-spinner fa-spin"></i>
            </div>
        </main>
        <div id="modalblock"></div>
        <div id="modal" class="column gapL center">
            <div class="header row gapS center">
                <div class="column spacer">
                    <h3 modal-item="SKU"></h3>
                </div>
                <i class="fa fa-window-close" aria-hidden="true" modal-action="close"></i>
            </div>
            <div class="body row gapL spacer">
                <div>
                    <img modal-item="Product_Image">
                    <div class="spacer"></div>
                </div>
                <div class="column spacer gapS">
                    <h4 modal-item="Product_Name"></h4>
                    <div class="row gapS">
                        <div class="column spacer"><strong>Condition:</strong><p modal-item="Condition"></p></div>
                        <div class="column spacer"><strong>In Stock:</strong><p modal-item="MAIN_Qty"></p></div>
                        <div class="column spacer"><strong>Price:</strong><p modal-item="Price"></p></div>
                        <div class="column spacer"><strong>Value:</strong><p modal-item="Value"></p></div>
                    </div>
                    <hr>
                    <div class="row gapS">
                        <div class="column spacer"><strong>Created:</strong><p modal-item="Created_Date"></p></div>
                        <div class="column spacer"><strong>Last Update:</strong><p modal-item="Updated_Date"></p></div>
                        <div class="column spacer"><strong>Last Sale:</strong><p modal-item="Last_Sale_Date"></p></div>
                        <div class="column spacer"><strong>Last Price Change:</strong><p modal-item="Last_Price_Date"></p></div>
                    </div>
                    <hr>
                    <textarea modal-item="Product_Description"></textarea>
                    <div class="row gapS">
                        <div class="column spacer"><strong>GTIN/UPC:</strong><p modal-item="GTIN_UPC"></p></div>
                        <div class="column spacer"><strong>MPN:</strong><p modal-item="MPN"></p></div>
                        <div class="column spacer"><strong>ASIN:</strong><p modal-item="ASIN"></p></div>
                    </div>
                    <div class="row gapS">
                        <div class="column spacer"><strong>Brand:</strong><p modal-item="Brand"></p></div>
                        <div class="column spacer"><strong>Category:</strong><p modal-item="Category"></p></div>
                    </div>
                    <hr>
                    <div class="row gapS">
                        <div class="column spacer"><strong>Min Price:</strong><p modal-item="Min_Price"></p></div>
                        <div class="column spacer"><strong>Max Price:</strong><p modal-item="Max_Price"></p></div>
                        <div class="column spacer"><strong>Bulk Price:</strong><p modal-item="Bulk_Price"></p></div>
                        <div class="column spacer"><strong>Seller Cost:</strong><p modal-item="Seller_Cost"></p></div>
                    </div>
                    <hr>
                    <div class="column"><strong>Listing Template:</strong><p modal-item="Listing_Template"></p></div>
                    <div class="row gapS">
                        <div class="column spacer"><strong>Length:</strong><p modal-item="Length"></p></div>
                        <div class="column spacer"><strong>Width:</strong><p modal-item="Width"></p></div>
                        <div class="column spacer"><strong>Height:</strong><p modal-item="Height"></p></div>
                        <div class="column spacer"><strong>Weight:</strong><p modal-item="Weight"></p></div>
                    </div>
                    <hr>
                    <div class="column" modal-item="Product_Attributes"></div>
                </div>
            </div>
        </div>
        <script type="text/javascript" src="/listing/panel.js"></script>
    </body>
</html>
